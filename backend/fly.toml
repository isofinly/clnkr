# fly.toml app configuration file generated for transcribe-backend on 2026-04-09T01:12:39+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'transcribe-backend'
primary_region = 'ams'

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[env]
  RUST_LOG = "info,transcriber_api=debug"

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256
